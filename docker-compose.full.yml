# Docker Compose - FULL STACK (Option 3: Everything in Docker)
# All services in containers - suitable for production and CI/CD
#
# Development Usage:
#   docker compose -f docker-compose.full.yml up -d
#   docker compose -f docker-compose.full.yml logs -f
#
# Production Usage:
#   docker compose -f docker-compose.full.yml -f docker-compose.prod.yml up -d
#
# Access:
#   Frontend: http://localhost:3000
#   Backend API: http://backend:3000/api (inside Docker network)
#   Backend API: http://localhost:3000/api (from host machine)
#   Database: localhost:5432

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: 3d-ecommerce-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce_3d_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_full_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 3d-ecommerce-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecommerce_3d_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      # Optional services (set empty values if not used)
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    command: npm run dev

  # React Frontend
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: 3d-ecommerce-web
    environment:
      REACT_APP_API_BASE_URL: http://backend:3000/api
      REACT_APP_RAZORPAY_KEY_ID: ${REACT_APP_RAZORPAY_KEY_ID:-dummy_for_testing}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - ecommerce-network
    restart: unless-stopped
    # For development with hot-reload
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm start

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_full_data:
    driver: local
