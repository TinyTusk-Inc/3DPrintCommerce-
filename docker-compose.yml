# Docker Compose - DEVELOPMENT (Option 1: Recommended for Development)
# PostgreSQL in Docker + Backend/Frontend run locally
#
# Usage:
#   docker compose up -d              (starts PostgreSQL only)
#   cd backend && npm start           (Terminal 2)
#   cd web && npm start               (Terminal 3)
#
# Frontend connects to: http://localhost:3000/api
#
# For Option 3 (Everything in Docker), use: docker-compose.full.yml
#   docker compose -f docker-compose.full.yml up -d

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: 3d-ecommerce-db-dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce_3d_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Persist database data across container restarts
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - ecommerce-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Node.js Backend API (COMMENTED OUT for Option 1)
  # Backend runs locally on your machine for faster hot-reload
  # For Option 3 (Everything in Docker), see docker-compose.full.yml
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: 3d-ecommerce-api-dev
  #   environment:
  #     NODE_ENV: development
  #     PORT: 3000
  #     DB_HOST: postgres
  #     DB_PORT: 5432
  #     DB_NAME: ${DB_NAME:-ecommerce_3d_db}
  #     DB_USER: ${DB_USER:-postgres}
  #     DB_PASSWORD: ${DB_PASSWORD:-postgres}
  #     JWT_SECRET: ${JWT_SECRET:-dev-secret-key}
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   volumes:
  #     - ./backend:/app
  #     - /app/node_modules
  #   networks:
  #     - ecommerce-dev-network
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   restart: unless-stopped
  #   command: npm run dev

networks:
  ecommerce-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
